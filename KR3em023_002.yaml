body:
  text: 卷二應用良方祕藥方黃連黃柏黃芩黑梔黃耆薄荷防風荊芥元參連翹細辛川芎白芷羌活山奈檳榔川朴苦參甘草木通半夏川烏草烏烏藥蒼朮三七麻黃大黃殭蠶牛膝桔梗射干乾葛牛蒡麥冬杏仁生地歸尾花粉南星赤芍升麻皂角刺車前子桑白皮五加皮地骨皮山豆根金銀花川槿皮廣陳皮以上共五十一味每重一兩各揀道地潔淨有泥者去淨法制者法制用新缸一隻盛之加清水量用多少浸之日曬夜露四十九日濾去渣將藥水入銅鍋內文武火熬以棒攪勿住手煎稠如糊入後藥明雄黃五分青礞石一錢童便煅七次沒藥五分去油乳香五分去油真熊膽五分焙煅龍骨五分枯白礬一錢白硼砂七分水飛爐甘石五分童便煅七次桑皮炭三分元明粉五分制青黛五分兒茶一錢輕粉三分石燕五分醋煅七次虢丹三分水飛血竭五分銅青五分石蟹五分童便煅七次海螵蛸五分綿包煨共計二十味研極細末將前膏和勻做小餅如指大曬露七晝夜後放土上用瓦盆蓋之一日一翻七日取起置透風處陰乾瓷瓶收好三月方可用研為細末每二分加後藥冰片四釐麝香二釐珍珠四釐西黃二釐珊瑚四釐輕粉二釐硼砂二釐共為極細末和勻收入小瓶內以烏金紙塞口用吹喉症神效通關散牙皂一兩瓦焙存性川芎五錢共研為細末瓷瓶收好聽用追風散淮烏川烏草烏牛膝麝香各等分研極細末瓷瓶收好麻藥方川烏草烏淮烏各等分共研細末瓷瓶收用本藥方川烏草烏淮烏烏頭龍骨象皮青黛制硼砂兒茶各一錢銀花五分血竭一錢珍珠二釐麝香三釐冰片三釐乳香五分去油沒藥五分去油青魚膽五分焙乾共十七味研極細末瓷瓶收貯勿令泄氣銅管吹喉本藥方明硼砂龍骨制青黛兒茶牙硝銀花各一錢乳香五分去油沒藥五分去油白附子熊膽冰片麝香珍珠各三分西黃五分琥珀五分共十五味研極細末瓷罐收好勿令泄氣吹喉用均藥方梔子三錢炒薄荷一兩黃連一兩升麻三錢雞肫皮二錢共為細末瓷瓶收好元霜散薄荷殭蠶青黛朴硝白礬火硝黃連硼砂共計八味研極細末用豬膽七八個到臘月初一日將膽汁倒出又將前藥末和勻復裝灌膽殼內以線扎頭外用青紅紙包地掘一坑深廣各一尺用竹一根將藥挂穿橫擔懸其中上用板鋪復以土密蓋挂至立春日取出挂風處陰乾去膽殼紙將藥研極細末每藥一兩加冰片三分治喉神效生肌散赤石脂五分煅海螵蛸竹箬包煨去殼一錢龍骨一錢煅血竭一錢輕粉二分半乳香三分半去油沒藥一錢去油硃砂飛炒黑一錢白芷三分半文蛤一錢枯礬少許麝香少許冰片少許共計十三味研極細末瓷瓶收好勿令泄氣每用吹喉紫霞雲水銀一錢硃砂一錢鉛熔化入水銀和勻一錢雄黃五分麝香五釐百草霜二錢共為細末每紙一條用藥五分加艾卷作條每日食後熏之以七條為度甚者九條即愈金箍散川大黃一兩錦紋丸大者或三四重穿心者更佳用紙包煨去廁中浸一月取起洗淨曬乾為末用五倍子三錢醋炒黑白芷五錢蜂房三錢蜜炒芙蓉葉二兩曬乾羌活五錢共研極細末瓷器裝每用蜜水調敷腫處周圍中留一孔出毒氣人中白散人中白二兩煅紅溺壺內佳兒茶一兩黃柏六錢薄荷六錢青黛六錢冰片五分上藥共六味研細末瓷罐收好勿令泄氣每用吹喉緑袍散黃柏一兩青黛三錢陀僧一錢共為極細末每用吹喉金鎖匙焰硝二兩五錢冰片一錢白殭蠶一錢雄黃二錢共為細末吹患處八寶膏貼瘡生肌收口黃丹一兩宮粉一兩血餘一兩滾水泡去淨銅青三錢羊糞一撮以新罐貯曬露七日不可見雨以上諸藥為末用桐油四兩香油八兩下鍋熬煎次下血餘猛火煎至血餘化盡入黃蠟一兩熔化方入前四味末藥以柳條不住攪滴水成珠為度取出退火毒方用二神散乾薑一兩雄黃三錢二味共研極細末瓷瓶裝盛吹痛處立止化毒丹防風連翹桔梗荊芥穗當歸各一兩酒洗甘草赤芍山梔黃芩元參薄荷山豆根犀角羚羊角各五分上藥共十四味研極細末煉蜜為丸燈心竹葉湯送下麝香散麝香三錢冰片三分黃連一錢共研細末密收一日夜吹五六次柳花散黃柏末一兩青黛三錢肉桂一錢冰片二錢共研細末瓷瓶收貯吹患處冰硼散元明粉五錢硼砂一錢硃砂一錢冰片一錢麝香一錢上藥共五味研極細末碔筤收好勿令泄氣吹喉白膏方制乳香制沒藥兒茶血竭輕粉定粉各等分上藥為極細末用豬板油熬四兩和藥末搗千餘下後入人乳再搗臨用攤貼解毒雄黃丸雄黃一兩巴豆十四粒去油殼淨鬱金一兩上藥共為極細末醋和為丸如緑豆大每服七丸專治咽喉科急症頑痰閉塞牙關不開以物撬開口用水將藥丸研灌下吐盡痰涎即愈有起死回生之功冰梅丸專治喉痹十八種俱妙大南星二十五個鮮者切片用大半夏二十五雙切片用皂角四兩朴硝四兩防風白明礬各四兩桔梗三兩一方用甘草無皂角揀七分熟大青梅一百個先將硝鹽水浸一周時然後將藥研細入水拌勻將梅浸入藥水中其水過梅子三指為度浸至七日後取出曬乾又入前藥汁內浸透再曬再浸以藥水干為度方將梅子用瓷器蠟封收好若梅上有白霜更好用時以薄棉紙裹之噙口內令津液徐徐咽下痰化病即愈一丸可治三人不可輕棄之箍藥方大黃一兩文蛤一兩蜂房三錢蜜炙芙蓉葉一兩陰乾白芨五錢羌活五錢上藥共研極細末瓷器裝盛每用蜜調圍箍之中留一孔出毒氣頻以蜜水潤之雄膽散治喉科七十二症黃芩三錢生用黃連三錢生用梔仁三錢炒黑制梅乾五錢煅存性青黛五錢雄黃一錢硼砂三錢雞內金一錢不見水人中白五錢枯礬一錢共十味依法制度研極細末入冰片六分麝香三分再勻每藥末五錢加西黃二分銅青五分熊膽五分珍珠五分兒茶八分共研極細末以瓷瓶封收緊密每用少許吹入患上一日夜吹十餘次徐徐咽下流出痰涎漸愈如有腐臭急用蚌水漱淨或用豬皂草烏柏子和搗加水去渣灌淨吹之大妙吹喉散唐先生傳專治口內一切雜症人中白二錢硼砂五錢青黛二錢五倍子一錢冰片五分外加以下二味杉木炭一錢六一散一錢共研極細末瓷瓶收好勿使泄氣吹患處立效喉風雙蛾一切火毒並治無不應驗人中白一錢火煅硼砂五分膽礬三分冰片一分共研細末吹患處吐痰而愈走馬牙疳臭爛痘內牙根腫疼並遠近蟲牙俱效兒茶一錢硃砂三分輕粉三分沒藥二錢制乳香二錢制血竭二錢西黃一分龍骨五分枯礬五分黃丹五分冰片一分珍珠三分大棗十個桑炭五分柳炭五分麝香一分共研極細末瓷瓶收好每用先將湯漱口再用荊芥五倍子煎湯加銀硃少許同洗淨再將藥搽患處立效治走馬牙疳午後汁兩鍾即白馬糞是也如一時難辨可預取為末臨時水泡取汁應用萬年干三錢七分即糞鹼是也用新瓦合蓋燒灰存性研細末二藥和勻漱之後再以冰麝生肌藥吹之又吹祕本二藥即愈大小口內臭疳瘡枯礬三錢煅人中白一錢煅雞內金一錢煅銅青一錢麝香二分冰片一分阿魏一分共研細末瓷瓶收好每用先將米泔洗淨患上將此藥干搽口蚌水洗更妙治喉閉立效硼砂二分冰片二分明礬二分黃連二分黃柏二分共研極細末瓷瓶收好勿令泄氣每用吹筒入喉中即開關三五次而自愈喉閉不能開關急方老王瓜一劑剮出瓜穰硃砂三錢芒硝三錢二藥和勻灌入瓜內倒吊陰乾候瓜外出霜刮下曬乾倘遇患此症吹之即愈取痰方二一用車前草連根葉搗汁加醋含漱口或吞或吐取痰極佳一用山豆根為末吹喉或煎湯漱口痰涎自出即效牙痛方蘆薈一錢二分龍骨八分火煅冰片五分共研細末擦牙患處又方胡椒一錢甘松一錢麝香五分共研極細末煉蜜為丸如梧桐子大每用一丸將新棉包安患處牙咬定止痛即愈立效焦氏喉科煎藥方三黃湯黃連黃柏黃芩赤芍梔子川芎薄荷甘草青皮陳皮花粉銀花元參射干當歸引用燈心竹葉同煎服涼膈散當歸川芎赤芍防風荊芥元參梔子黃連石膏花粉連翹桔梗薄荷風甚加銀花黏子火甚加貝母栝蔞水煎服荊芥防風敗毒散荊芥獨活防風川芎羌活桔梗前胡茯苓枳殼柴胡各一錢人參五分甘草五分引加荷葉一小片水煎八分食後服或加薑三片寒甚加蔥三根千金內托散元參人參桔梗青皮陳皮連翹甘草川芎當歸赤芍蔞仁花粉銀花厚朴防風加燈心水煎食後服托裡消毒散人參白朮黃耆當歸白芍川芎茯苓各一錢銀花白芷各七分桔梗角刺甘草水二鍾煎八分食後服若脾弱者去白芷倍人參四七氣湯茯芩厚朴半夏橘紅青皮枳實砂仁南星神麯檳榔蘇梗白豆蔻益智仁引加薑片煎服補中益氣湯黃耆一錢炙人參一錢甘草一錢炙當歸一錢白朮一錢炒升麻三分麥冬六分五味子三分柴胡五分引棗二枚薑三片同煎空心熱服瀛洲學士湯乳香沒藥川芎白芷梔子貝母薄荷陳皮當歸黃連升麻木通防風甘草赤芍花粉銀花穿山甲皂角刺引加燈心淡竹葉水煎服十八味防風銀花甘草赤芍知母荊芥陳皮麥冬花粉貝母黃柏牛蒡當歸梔子連翹元參桔梗川芎水二鍾煎去渣服還魂散陳皮人參赤芍黃耆蒼朮黃芩防風栝蔞黃柏銀花川芎當歸茯苓白朮黃連甘草水二鍾煎去渣服之回生散白醜一兩五加皮一兩炒桔梗四錢連翹五錢去心花粉五錢土茯苓三兩薄荷一兩梔子一兩皂角刺七錢煎服當用三分之一或煮酒服可用全方入陳酒三斤內補湯當歸赤芍白朮栝蔞銀花連翹梔子元參川芎薄荷黃連花粉黃柏黃芩防風陳皮青皮黃耆蜜炙桔梗水二鍾煎去渣服之蘆薈消疳飲蘆薈銀柴胡牛蒡子胡黃連元參桔梗川連山梔薄荷石膏羚羊角升麻甘草引加淡竹葉水同煎服藿香正氣湯藿香白芷大腹皮紫蘇桔梗各一錢茯苓半夏陳皮厚朴白朮各八分引加薑一片棗一個水二鍾同煎熱服取汗為度治陰瘡方治一切陰瘡加均藥末三錢共十六味乳香沒藥穿山甲白芍防風當歸川芎赤芍木通陳皮花粉甘草銀花貝母皂角刺水煎去渣服又方當歸甘草黃連茯苓白朮陳皮元參赤芍黃芩蒼朮黃耆防風黃柏栝蔞銀花水煎去渣服治口疳瘡方白醜五加皮白蘚皮桔梗甘草連翹花粉銀花薄荷山梔治口疳毒瘡方皂角子山豆根土茯苓引加燈心水煎服或研末和服俱妙又方栝蔞仁花粉桔梗銀花連翹赤芍川芎白茯苓當歸薄荷陳皮黃芩青皮黃連款冬花黃柏防風元參水煎去渣服之桔梗湯治肺癰咳嗽吐膿血桔梗栝蔞仁百合防風當歸枳殼黃耆貝母元參白蘚皮薏苡仁各八分杏仁甘草各五分黃芩八分水煎服洗藥方藿香山奈苦參荊芥甘草防風白芷細辛黃柏銀花地骨皮各等分煎湯用青綢蘸藥水溫洗患處牙疼加減方荊芥防風甘草石膏青皮生地丹皮升麻上正四牙加黃連麥冬下正四牙加黃柏知母上左二牙加川芎白芷下左二牙加白朮白芍上左盡牙加膽草羌活下左盡牙加柴胡山梔上右二牙加當歸茯苓下右二牙加木通車前上右盡牙加大黃枳殼下右盡牙加黃芩桑皮蘇子降氣湯蘇子三錢厚朴一錢陳皮一錢前胡一錢半肉桂四分半夏一錢半甘草五分引加生薑三片同煎八分食遠服黏子解毒湯牛蒡甘草升麻生地花粉連翹白朮黃芩黃連山梔桔梗防風青皮元參乾葛水煎服八正順氣散陳皮砂仁枳殼桔梗白芍甘草當歸川芎人參牛蒡水煎服蠲毒流氣飲白芷防風陳皮連翹人參香附川芎當歸元參花粉枳殼甘草牛蒡桔梗柴胡山梔水二鍾煎服苦酒方黃耆三兩白芍二兩桂枝一兩六錢上為末每服三錢苦酒三合煎至七分不以時頻服半夏桂枝湯