口疳喉癰閉塞等症神效方鳳凰衣即雞蛋內衣膜去淨殼微火焙黃橄欖核瓦上煅煙淨存性用孩兒茶各等分大梅片五分共為細末和勻瓷瓶收貯口瘡口疳搽患處喉症用銅吹裝藥吹入喉內即飲食吹喉回生丹治喉垂危急症不拘雙單蛾真能回生仙家祕授之法不可輕視慎之慎之硼砂一兩牙硝三錢冰片六分麝香四分共為細末瓷瓶收貯不泄氣臨用時少許吹患處治口瘡喉閉乳蛾之症膽礬一錢熊膽一錢廣木香三分共為細末以木鱉子一個去殼磨井水以鵝翎蘸藥敷之一二次即愈又方治大人舌上瘡腫神方雞肫皮一個雄者佳不見水以陰陽瓦焙酥研末硼砂三分白色透明者佳烏丁泥五分黃連五分共為細末擦舌上瘡即愈又方治項頸浮腫外用敷藥大黃一兩榆樹皮五錢皮硝三錢共為細末用醋水各一半調敷周圍自愈檳榔散治口瘡大有神效五味子三錢寒水石五錢煅蒲黃一錢五分黃丹一錢五分上為細末每服少許干貼瘡上立效散訶子肉五倍子各等分上為細末干貼唇上立效又方治口瘡疼痛五味子三錢嫩者妙滑石五錢研黃柏五錢蜜炙上為細末每服五分乾摻瘡上良久便飲食黑參丸治口舌生瘡久不愈黑參去心天門冬去心麥門冬各一錢去心上為細末煉蜜為丸如彈子大每用一丸綿裹噙化咽津雙青硼砂散治口內一切諸瘡等症青黛八方青鹽六分兒茶一錢人中白一錢五分硼砂八分胡連二分冰片一分共為細末吹口內效驗如神緑雲散治口瘡爛臭久不愈黃柏蜜炙青黛水飛各等分共為細末臨臥用少許摻口咽津妙又方治小兒口瘡不能食乳白明礬等分研末和雞蛋清置醋中調塗小兒足底二七日愈麻藥方細辛南星半夏牙皂各等分研極細末用少許放患處便不知痛可用刀針
