body:
  text: 卷一治喉祕法夫喉咽之症用藥須知緩急行針貴識頭尾如牙關緊急通關散可施風毒痰壅追風散當用三黃涼膈有消痰降火之效二陳荊芥有豁痰驅風之功潰爛必須內托收成全賴生肌麻藥用於未針之前祕藥用於既針之後箍藥敷之紅腫散水藥服後郁痰行洗藥去舊生新熏藥伐邪存正吹藥施於痛時刀針用於腫處雙單蛾生於咽門而圓小無膿吹本行針有膿挑破自愈可服涼膈等湯喉疔花疔形似靴疔而差長上麻藥而鉤住刀割用鐵烙而吹祕止痛內托自消紅色可治黑色難療癰之雙單耳下腮邊或腫治同乳蛾潰服內托雀舌左右形小而尖喉中舌底有痰治類喉疔只服三黃鈿舌蓮花靠舌根而起中不可用針纏舌喉風口噤舌卷腫大三黃涼膈不可緩緩則難痊蛾之雙單並死活日久脹大作痛無時用刀細割一層搽爛藥於其中切勿吞下須吐出吹祕一月方見其功用烙烙之三黃可服至若走馬牙疳喉疳口疳結毒牙齦紫腫臭穢不堪必吹本祕生肌在用午後年干漱口臉腫頭搖咽乾音啞身熱唇穿落牙無血俱為不治服土茯苓末自有奇能喉單似蛾尖而小宛若牛乳之狀氣單似梅核而小用其四十九針回食單即甸氣生蒂疔兩旁紅起當中名梅核吐不出而吞不入梅核用針甸氣用三黃十八兼用二陳四七成功重舌舌上生可刺金津玉液蒂疔腫後號懸疔吹祕勿針藥服三黃與犀地死舌名木舌堅硬不能舒咂舌癰生喉中能令舌短難語有痰先用追風癰頭必須剔破初服三黃久宜內托白紅紫色猶堪治黑色腫時魂魄離兜腮癰生腮下外敷金箍散內服十八方膿從口出易治膿從腮出難痊膿生火針刺肉爛祕生肌螓舌有心黑宜挑去更服三黃涼膈間用祕本吹之收功仍用生肌飛瘍立時而起喉痹頃刻而治此必先探吐本吹刀刺何傷鎖喉風牙關緊急手足登開先刺四穴以辨生死次浴手足以開脾胃或刀或針血去腫消為上策纏喉風眼白麵紫項腫不言勢如角弓反張命在須臾而難保探痰刺血病根除喉球相牽似綿可服益氣疏風再用麝香調服兼吹本祕追風骨槽風如口噤者治之先吐風痰垂下五分灸七壯清陽散火療之愈舌下痰癰刺青筋膠涎隨出如蛋清加味二陳湯清熱如聖散用之皆靈喉中有瘜肉壅塞相重疊枸橘湯雄黃末飲搽最妙出汗生癰腫黑生癰左右陰瘡三般無異金箍散十八方敷之服之相當氣癰喉痹酒毒喉痹二者同塗金鎖匙三黃散吹飲即愈大抵吹藥本下過刀針祕復吹余腫不消用均末刀口難完上生肌喉中氣味人中白追取風痰金鎖匙水藥時含口冰梅頻咽津抑火三黃涼膈散消腫須知十八味內托千金散化痰二陳湯虛火血虧從四物陽虛氣弱四君當惡寒須解表便祕必疏通此是喉科真要訣學者必得盡心功治喉要訣一針手足辨陰陽鮮血迸流命自長若是些些黃白水預知旦夕見危亡二從耳下頸腮中慢説麻絲細刮紅方用眉刀患處割鮮血多者不為凶三針舌下小青筋血出鮮紅病體輕黑腐成條絡是死胸中結熱把痰清四般惡症曰懸癰重齶纏喉並鎖風熱積風痰胸膈結三黃行下自疏通五內虛邪火上行欲教分散須施針少商曲池頰車穴男左女右辨分明六用追風散取痰痰如清水不多湲連吹本祕寬胸結涼膈追風及早啖七從頭尾可行針切忌中間根上行鮮血多來休慮遠黑而少者不長生八刀割患要深知麻藥先從患處吹撑口中間勾搭住連施刀法莫狐疑九行烙鐵要除根炭火桐油一處焚只待燒紅方細烙連將祕藥上安寧十全灸法在風池五壯原來甚得宜再把頰車加幾壯少商灸罷曲池隨臨症二十法凡咽喉無病其色淡紅而白不高不腫一有患處必紫而腫試病之法或癰或痹或蛾認不真只吹本於外腫處下刀針次吹祕無有不效如不腫只外痛乃風熱太甚先宜疏泄後用清化若喉痹不須下刀針吹本祕服三黃湯三四劑自愈一蒂疔在喉中為人之主用刀用針用烙切不可犯之犯之必死一重齶自上齶腫起至舌風熱過甚早治可生遲則湯藥難進一懸疔即蒂疔腫起垂下懸塞喉中刀針難施一蘊積熱毒喉中有大小諸瘡謂之珍珠毒口乾起稠痰辛苦或作痛吞吐不利吹本祕挑破出血服學士湯一針之法先捺倒舌針靠撩舌根輕輕一挑即出切不可慢恐病人低頭吐痰血誤事遠遠刺去須防蒂疔一烙鐵用紋銀打茶匙樣用陳艾包烙鐵外以棉花包住蘸桐油燈火上燒盡無煙擱在燈上取圈撑住口令人扶住捺定舌根使人刮淨烙鐵看真患處連烙一烙即出不可緩慢恐傷犯蒂疔烙後即吹祕藥解熱毒又一烙法將炭燒紅入干艾烙鐵放艾上燒紅依前法治之須眼明手快一夜深看病用燈著人站於醫生腦後照看方見喉中或喉小病在喉下看不真勿下刀針只吹追風本祕數次待天明再看一天陰忌用刀針恐看病不真或傷好肉待天明朗借日光以助眼力方可看治一針少商穴果系病篤方針其穴在大拇指角尖離一韭葉許一頸外腫甚方用水藥滾下其痰若不甚腫用之非宜一牙關閉緊不可即用圈撑口先用通關散吹鼻俟口略開用薄小木片撬入吹追風散去痰口又略開方以圈扁入緩緩撑起令人扶住捺舌於圈內細看何症方可用藥一用刀割須令病人仰面後使人扶頭捺住舌些些細割勿傷好肉一癰蛾疳疔等症紅暈可治黑色必死一疳瘡爛深不必用刀針只吹本祕數次如腐肉多即用頭髮扎一小刷將黃連黃芩煎水去渣以刷蘸水刷盡腐肉即以此水漱口數次吹祕止痛不然藥氣不入一疳瘡爛透頸外用藥熏熏藥作捻子入竹筒筒口如瘡大一頭蓋瘡一頭熏之煙衝入竹筒漸透至瘡上以七條為度口含甘草湯解毒恐毒入內致生別症熏後忌發物一面赤目睛上視不治一頭低無精神不治一臭似煙煤不治一鼻中入氣少出氣多不治一頸下腫甚蜜調藥敷之常使水濕勿使藥干焦氏喉症圖形針藥祕傳按此症因風熱蘊積或酒色勞力生於喉中如鎖喉樣有單有雙雙者治必先探風痰或兩邊俱無形迹只是白色疼痛難以飲食名曰鎖喉風口噤先用通關散吹鼻內開口次針少商穴喉內用六針吹風取痰後吹祕宜速治若痰涎壅塞手足反張熱水洗溫重者服三黃湯或用甘桔加荊防銀花即愈鎖喉口噤通關散追風散後用刀針少商針罷針六穴膿血去後吹祕神更服三黃加甘桔荊防銀花入更靈此症因積熱久或煎炒傷胃冒風勞力受氣而起其症眼白耳赤面腫腮紫向下患此者死於旦夕延一二日慢風也先針少商用追風散取痰次吹本於腫處下刀針去膿血吹祕數次服三黃湯多加荊芥防風銀花如背朝天面朝地手足登開口亂言角弓反張口難開者先吹通關散如鼻中使嚏則口開如不嚏是風火太甚再吹一二次等半晌自嚏口開剪刀撬以圈側入捺舌吹追風散取痰吹本於患處下刀針又吹祕服三黃湯吹祕加生肌散纏喉風腫噤難言左右腮邊腫赤兼手足登開面朝地吁嗟立刻喪黃泉先探風痰針四穴旋吹本藥刺喉間祕吹用服三黃散有膿內托即安痊此症受病治法同前在蒂疔後有膿用鉤刀鉤破膿出吹祕服三黃湯二劑次吹本祕均加冰麝破爛吹生肌如膿不出服千金內托多加銀花如蒂疔人身之主刀針烙鐵切不可犯如疔腫只可以吹藥服三黃涼膈或蒂丁紫腫用甘桔俱妙此症寒濕風毒而生腮下兩邊或一邊者如口內腫吹祕用刀去血日久去膿初起頭疼發熱惡寒服荊芥防風敗毒散後服學士湯日久不得消千金內托外敷金箍散或以火針去膿膏貼自愈兜腮風毒因風熱左右腮邊多腫結口內腫甚宜針血初起頭疼發寒熱荊防敗毒何須説瀛洲學士及千金敷用金箍奇妙訣此症受風熱濕毒或因風勞酒色而起下頦俱腫口噤舌卷腫大上有筋如蚯蚓之狀生黃刺白胎如咬牙不開宜針少商出血可治然血白黃水不治治者先探風痰次刮舌胎吹本刀刺青筋出血宜針玉液金津出血漱淨吹祕服三黃湯涼膈散一二日可治日久有膿服千金內托散如木舌短大者吹追風散頭搖勿治塊黑難治此症死者多先針四穴纏舌喉風頦腫生先刮舌胎刺青筋旋探風痰吹本祕再針玉液與金津口噤舌胎是黃黑宜刺少商出血輕三黃涼膈初宜進膿成內托用千金此症食熱物或酒或風而生先針四穴定死生吹追風散取痰又吹本祕於喉內並齒爛處舌卷擦追風散或吹本於舌上針舌下三穴不卷不針二陳三黃涼膈多加荊防若頭搖牙咬牙落頭腫疔破者諸不治語言清楚年輕體壯猶可施治用白午後年干炒灰為末吹上止痛再以午後取汁同年干追風合漱服三黃加荊防頭劑可用後劑不可用記之走馬喉風生舌下迅如走馬入喉中先針四穴還吹祕噙取午後及追風清心舌下針三穴有痰吐去氣宣通二陳涼膈猶宜用頭搖疔黑總成空此症外受風熱內由氣鬱而起蒂丁兩邊腫痛飲食不利口噤難言痰涎壅塞形似乳頭故多名乳蛾治者用元明粉醋取痰吹本刀刺出血吹祕與本服三黃涼膈散有膿去之服千金內托散吹生肌散服桔梗湯更穩單方用蟢子窠十餘張瓦上燒灰存性點三四次即愈或土牛膝草根搗汁含口亦妙鮮薄荷一撮洗淨搗和醋汁嗽口吐涎即愈荔枝草搗碎水煎待溫含漱口吐涎立效雙乳蛾生喉兩旁皆由風熱痛驚慌痰涎壅塞水難入探吐風痰本藥當頭尾小刀宜去血祕加均末服三黃日久有膿千金散收口生肌極妙方此症因風熱勞鬱而起於邊痰涎壅塞甚者手足冷頭昏沉者用玄明粉醋取痰吹本去血吹祕服十八味或三黃湯若五六日服千金內托散鼻吹通關散膿自出灸合谷穴用均祕生肌如腫不省人事命欲絶者用吳茱萸米醋調敷湧泉穴單蛾勞鬱熱風因腫塞喉中似乳形頭目昏沉手足冷探吐風痰吹本針十八神方能散毒有膿內托用千金膿成畏刺通關散吹入鼻中膿自淋此症食炙爆厚味醇酒胃火上衝生於疔旁腫痛與蛾相似圓而小癰塌而長耳根腮下俱腫項痛牙疼治法同前如腐爛先服十八味一劑吹祕次將本與生肌又用童牙血青黛末合吹最妙積熱喉癰厚味因疔旁腫痛若蛾形本吹去血還吹祕三黃學士細評論七日膿成內托散通關吹鼻免刀針祕合生肌收口用管教起死立回生此症受風熱鬱怒而起喉中緊靠蒂疔不甚痛飲食有礙若勞心不忌口不避風日久不治長塞喉中漸加氣悶以致殞命治者用刀橫刺必要長大待血盡入白藥於刀口內以爛之每日行刀用藥一次吹本祕護之逐日如是爛盡下烙以平為度服涼膈散甘桔湯十餘劑忌煎炒雞魚豆腐牛肉犬肉生風發熱宜服水藥拔毒死蛾鬱怒起咽中不脹不痛塞喉嚨日長日增能閉氣損軀殞命最為凶吹本用刀須割去均末頻吹遂日功患上將平方不烙二陳三黃喜氣隆此症氣惱鬱結不伸而起喉邊形起乳頭遇陰天勞神氣惱頸外如繩扣住飲食不下呼吸不利日久年深則蛾下起黃皮或白皮一條長入喉底治者吹本用鉤鉤住皮條細細割盡無影如割未盡服桔梗二陳湯消盡下烙忌青菜刀口不收生肌散加冰片吹之初起未有如嫩骨之皮吹本刺蛾吹祕服劑同前或久甚如嫩骨之黃皮長入喉內以至於服藥則不能治矣喉中生起乳蛾核氣鬱於心由此得長在喉中似乳頭天陰勞氣如繩赤呼吸不利飲食難日久月深成嫩骨吹本刀割待無蹤方平下烙將蹤滅宣通桔梗二陳湯收口生肌卻有益此症受風熱或食炙爆受毒而起老者難愈少者易痊先以白午後汁二杯年乾末三錢七分含漱拔毒少頃吐出不可咽下含止痛次以祕加冰片麝香珠粉牙末合均吹服學士湯加大黃三錢二劑壯盛者即服土茯苓十二三劑時含前藥色轉紅者治否則不治或三黃湯三劑若爛洞吹生肌散止痛後用紫雲煙燻之口含甘草湯解毒忌生羊肉與煎炒發物喉疳熱毒心腸傳可憐臭爛不堪聞噙用年干加午後祕加珠片射吹頻初服大黃加學士三黃土茯末回生紫雲熏口功奇妙收斂生肌止痛靈此症因夏天滴鼻汗於豆腐內食之食穢惡自死禽獸肉或食水缸內日久生毛米糝或因怒氣而起形若花疔之狀色紅易治黑者難治搽追風散數次轉紅可治如大而硬鉤搭烙吹本止痛吹祕服千金內托散再吹生肌涼膈散或甘桔湯二劑如較少只用挑去紅筋搽本自消開花疔因怒氣生狀若開花取長名吹本用刀平割去祕搽下烙病無形三黃涼膈初宜進千金內托治膿成毒若內攻頻氣喘疔形黑色命難存此症原由治法同上症開花疔喉疔因食毒穢生長在喉中棗核形紅易紫難黑不治先用追風轉色生用刀割去吹本祕下烙能教病除根三黃涼膈加銀草有膿內托用千金此症食煎炒熱物及受氣而起喉內微腫而紅初起吹追風散取痰吹本於患處針首尾出血吹祕服三黃涼膈散日久有膿吹本挑破祕加生肌散吹之服千金內托散如膿不幹吹本與追風即愈又一症形如狗尿下刀去血刀痕即合刀割宜長吹祕可愈喉單風熱喉中腫頃刻水氣不可通吹祕針攻頭尾穴三黃涼膈早宜攻日久膿成須內托加祕生肌最有功此症因氣鬱有痰而生在喉中兩邊兩條紅色為甸氣在喉小舌下紫紅色點如豆大名梅核若疔下無核定在前舌根下或在左或在右中必有青筋系在齶或白色如蜆肉似桃膠兩邊紅筋垂下久則前心後背疼且噯氣喉中若蟲行骨梗噎氣阻食或犯之即痛治者吹本一二次針去血吹祕數次將平則烙三四下除根再吹祕以解火氣乃灸喉下初起一穴久者三穴深甚灸五穴灸口內出煙為妙如不出煙九壯為止先服十八味加減入大黃三錢行痰瀉火年大者服酒藥二三十行兼服二陳四七等湯二三十劑大抵開鬱化痰順氣利膈泄肺為主若頭大而無血謂之焦頭若針不入與甸氣垂下不見形迹俱不治前後心痛當用火灸甸氣用刀割梅核用針如灸稍好喉中乾燥要灸氣血三里穴七壯足三里在膝眼下三寸脛骨外大筋宛中舉足取之弄舌喉風時吐舌常時手弄命須臾直刺少商流去血隨吹金鎖即痰除雄黃化毒須先服用刀刺腫祕時吹疏風甘桔湯宜服管教患者病消除歸尾花粉山梔甘葛荊芥桔梗元參川芎連翹人參枳殼茯苓陳皮甘草防風黃連祕十六本十五雄黃化毒丸九金鎖匙四此症因熱毒積於心經以咽喉乾燥無痰妨飲食難治順氣利膈湯川芎桔梗黏子白芷花粉黃芩甘草元參防風山梔枳殼烏藥陳皮用連根蔥一枝燈心一團水二盞煎七分食後服如心肺間刺痛者用當歸連翹散加大黃利之如久不食毒陷能傷人命嗆食喉風熱積心喉中乾燥立時疼更無痰涎多氣喘若還嗆食命無存順氣利膈湯急進燈心為引與蔥根毒入肺間心刺痛連翹散利妙若神此症七情所傷鬱塞喉間痰涎稠黏身發熱惡寒分上中下三關毒在下關難治上中可治吹祕服雄黃解毒丸後服參苓順氣散參苓順氣散人參枳殼紫蘇粉草陳皮元參桔梗茯苓蒼朮炭白朮烏藥山梔花粉等分水煎溫服氣癰喉閉塞喉間憎寒惡熱吐稠涎雄黃解毒宜吞下參苓順氣急須煎喉內還須吹祕藥何須祈禱拜神前此症因熱盛膈間或過食炙爆厚味以致火動痰生而起治者吹本下刀吹祕服三黃涼膈散有膿服千金內托又甘桔湯加銀花腫不消用均末加冰麝吹之喉風積熱氣喉中壅塞須臾氣不通痰涎腫痛難言語先將祕藥入喉嚨用刀去血還吹祕內服三黃涼膈通膿成宜托千金散生肌收口有神功此症因受惡穢之氣及風熱而起喉間生赤肉層疊腫起有孔出臭氣氣塞不通者是也治法以祕加雄黃人中白吹之再以臭枸橘葉煎湯頻服疊肉不消用小刀刺去血再以臭枸橘葉煎湯頻服瘜肉喉風生喉中肉赤層層口臭沖涎痰壅塞氣不通雄黃中白祕吹入枸橘煎湯服有功不消刺血毒氣退忌食酒腐魚蝦同此症痰塞於咽膈之間故牙關不開不能言急用蟾酥化水滴鼻中即開桐油探吐風痰再用甘草湯解桐油之氣喉中赤腫吹本下刀去血吹祕連服荊芥防風敗毒散一二服面紫舌青唇黑鼻流冷涕甲面俱青目赤多淚不治啞瘴喉風口不言牙關緊急吐流涎水化蟾酥滴鼻內桐油探吐可安然喉中有腫難直刺荊芥防風敗毒散此症因積熱毒又感風邪而致紅微紫其形若拳面赤而目上視壯熱惡寒如傷寒若聲音不響宜用潤肺之藥外吹祕若外腫以金箍散敷之牙關強急宜探風痰發熱惡寒服荊芥防風敗毒散表之後服加四物湯以滋陰降火並用此方黃連桔梗貝母甘草花粉牛蒡射干杏仁薄荷用水煎服風熱喉痹受熱風忽生紅紫塞喉嚨目睛上視有寒熱荊芥敗毒表相攻聲音嘶啞當清肺四物滋陰藉神通腮項紅腫金箍散還將祕藥入喉中此症熱毒傷心脾二經之氣通於口循環上下故咽喉腫痛而黃其血黑其形若臂其腫如坎面赤上視治先探風痰吹本祕腫不消去血服黏子湯若單痛不腫無形可見吞吐不利先針少商穴以定生死又有結喉痹舌根俱黑甘桔湯加乾薑附子各一分一服自愈有痰加貝母去附子如熱氣外沖難以用藥超本祕一匙於水上令患人仰臥灌入喉中其熱即愈治喉痹單方牛膝草根洗淨搗汁人乳少許灌服不能服者灌鼻內喉痹熱毒感心脾咽喉痛閉最難醫其形似臂腫如坎目睛上視面如朱治法探痰吹本祕黏子解毒湯為妙不消刺血祕頻吹牛膝根湯頻漱之此症冬日感陰濕火邪而起腫如紫李微見黑色外症惡寒身熱振動腰疼頭痛血紅可治血黑不治血微紅腫處軟有痰者可治血黑硬痰乾者難治先服化毒丹次服蘇子降氣湯吹祕戒酒一月陰毒喉