毒散口渴煩躁其症在裡服三黃湯涼膈加大黃牙疔惡穢觸陽明縫中高突若疔形腫連腮齶生寒熱破流紫血臭多疼吹本用刀平割去均祕時吹效更靈三黃涼膈多宜服還將水藥口中噙此症陽明胃經之火上攻而宣露牙縫出血不止上屬脾下屬胃吐痰血至升斗者難生急即速治遲則不救治者水藥漱淨吹祕塞楝裘丹服清胃散犀角地黃湯止血四生湯甘露飲或胃中虛火動而牙齦腐爛痰血常流不止不可用上藥宜服蘆薈飲吹人中白散四生湯生荷葉生艾葉生柏葉生地各三錢水煎入童便一杯食後服牙宣胃火起陽明縫中出血不留停急用瑤池噙漱淨楝裘丹塞立通神犀角地黃清胃散四生甘露選中評胃中虛火牙齦爛蘆薈丸吞極有功此症因心火旺動或受鬱怒酒色而生大舌先卷根下另生小舌形紅肉嫩名曰重舌治者吹追風於大舌上吹本於大舌下大舌治軟吹本於大舌兩邊根下一邊針去血次針小舌兩中不可刺針數以本與祕吹之即愈初起者服三黃瀉心湯瀛洲學士湯涼膈散俱可擇用將成膿只用千金內托托之待膿一熟挑放搽追風吹本祕重舌緣因心火生或因鬱怒火隨升舌下還生一小舌頦腫流涎多疼痛金津玉液頻針血祕吹痛喊即時寧初宜學士瀛洲服成膿須要用千金此症受風熱濕鬱結或食煎炒炙爆而成或左或右治者用熱水多洗手足開脾胃外敷金箍散內吹祕於瘡口過一日將藥水洗淨貼八寶膏十三四日貼白膏後如瘡口不收穿破喉內外用紫霞雲熏之俟口內煙出服三黃湯加回生散再加四味末藥翻白草五加皮白蘚皮黑醜各等分為細末共入回生散內煮服又宜服學士湯還魂飲有膿服內托千金散男用女吮女用男吮去膿忌發物陰瘡風濕兩相因致患喉旁左右生熱水不時洗手足內服不須用二陳吹祕敷用金箍散膏封瘡口紫霞熏三黃加上回生散瀛洲四味及還魂此症感四時不正之氣初似風寒惟耳項發腫毒入喉間腫痛吞吐不利沿門傳染始起發寒熱體強頭眩脈浮緊數為邪在表以荊防敗毒散汗之兩目鼻面腫者乃陽明受病發熱便閉口乾多熱少寒脈數有力為邪在內用五錢大黃湯下之頭角兩耳結腫頗脹痛寒熱嘔吐口舌咽乾煩躁特甚以知母石膏湯小柴胡湯和之通用防風通聖散加牛蒡子元參解毒通解表裡勞役凶荒沿門傳染用普濟消毒飲藿香正氣散以安之表裡俱解腫仍不消宜針去惡血熱甚者金箍散敷之後仍不消必欲作膿宜托裡消散加白芷皂角刺托之膿成脹痛針之已潰體倦食少補中益氣湯膿穢脾虛食而嘔吐香砂養胃丸腐潰而不斂十全大補湯如毒中三陽項上俱腫光如水色雙目合縫唇白楮形口角流涎聲音不出飲食不入喉腫閉牙關難開破流臭水穢氣不絶者不治年荒時毒流行忌用攻發法當和解以養正氣此症上熱下虛血氣俱虛以致筋不收或大笑之後或呵欠久下頦落下牙齒不交合語言飲食難一二日可治久則難治治者令患人平身正坐以兩手托住下頦左右治將兩大指捺牙槽端緊下頦用力住肩下捺開關窮隨用絹條兜住下頦繫於項上虛者服補中益氣湯或灸頰車穴七壯補中益氣湯黃耆人參當歸白朮甘草各一錢升麻柴胡陳皮一錢棗二枚生薑二片水煎食後服咽痛加麥冬黏子玄參去生薑落架風因氣血虛致將筋骨不收拘或因大笑及呵欠牙關落下氣長吁平身正坐兩手托大指入口捺牙槽食中小指端下頦望後推之病即愈此症凡食熱物出汗過多而生面黑向下腫兩邊腮腫喉中氣閉治者用熱水洗手足喉內出氣先針少商穴如有血出內吹祕如不愈合追風均末吹之服桔梗二陳湯或甘桔湯數劑吹追風散於頰內並吹牙盡處亦有風串入牙致牙根膿出齒落用蜜和祕敷之面腮腫黑濕熱生兩腮腫黑又多疼喉中氣閉人妨悶洗和手足少商針祕均合用追風散桔梗湯須合二陳此症心經毒氣少腹邪風發於聽會之端注於會膺之側列生如癧閉塞難通不能飲食紅腫發熱漸次潰膿軟而脹疼此症初起用連翹當歸散日久用千金內托吹祕加生肌貼白膏外腐內潰湯隨水孔出者曾治數人亦效連翹當歸散當歸生地連翹前胡甘草枳殼桔梗黃芩黏子白芍元參花粉引用燈心初起外用蜒蚰片麝杵爛敷之妙鎖喉風症心經毒少腹火氣及邪風發於聽會初如癧咽喉閉塞氣難通當用連翹宜進服膿成內托散收功祕合生肌吹患處初起麝蚰敷即松此症起於脾經食煎炒油熾等物及飲酒太過而行房事以致毒氣不能流行聚結喉根若不速治毒閉即死治者先去痰涎後吹祕藥服八正順氣湯喉腫脾家濕熱生醉後行房所致成氣不流通結喉下先探痰涎祕藥噙八正順氣宜煎服管教患者得安寧此症憂愁多慮太陽受病結於大腸之間邪毒交生蘊於經絡之內或鬱怒傷肝致筋骨緊急思慮傷脾致肌肉結腫膏粱厚味致釀膿穢小兒生此乃氣稟虛弱感暑風濕熱或食肥甘而起於耳前或耳下腮腫連項隱隱皮肉痛徹筋骨略有小核如李大紅腫寒熱如瘧或下或上或左或右牙關緊急初生堅硬不消久則瘡口難愈先探風痰初宜艾灸腫項及耳下五分各灸七壯膏貼之以泄內毒用金箍散加追風散敷外腫處牙關腫處吹本追風散刀刺出血吹祕服清陽散火湯潰後服千金內托加五味麥冬或中和湯吹祕合生肌使水升木降脾健金清乃愈若外腐不合虛熱不退堅硬不消形體消瘦者死清陽散火湯治牙根盡處結腫連及耳項作痛升麻四分白芷七分黃芩當歸黏子連翹防風荊芥各一錢四分甘草四分石膏三錢白蒺藜一錢水煎食後服骨槽風起太陽經皆因鬱怒致傷筋思慮傷脾肌肉結耳下牙關急痛生垂下五分針七壯吹用追風亦用針清陽散火初宜用中和內托值千金此症因久積熱毒於心而起舌腫色白如木舌相似但木舌小硬此腫而白治者以刀刮去白皮用追風散加冰麝青皮乾薑末手指濕水蘸擦舌上即愈腫甚刺金津玉液出血吹祕服學士湯含口水藥時吹本祕日久膿成左右挑放舌出黑血刺治不轉色舌卷不能言並舌硬者死死舌癰生如木舌其形白色腫多疼刮去白苔須洗淨追風冰麝乾薑青玉液金津宜去血吹祕還將水藥噙瀛洲學士湯宜服舌卷黑色命無存此症因心經積熱及氣鬱勞傷兼挾暑濕熱之氣而起舌下生五峰尖似蓮花之狀三峰者輕七峰者重有痰追風取痰吹本於旁峰上出血吹祕中尖乃心之苗切不可針以傷人命初起服黃連瀉心湯並學士湯日久則服千金內托散膿熟刺放吹祕再吹生肌散亦有生於舌上者比舌高寸許在下根兩旁放血吹本祕即愈細舌蓮花何以因皆由積熱在心經三五七峰生舌下形似蓮花取此名忌傷舌下中央穴須針玉液與金津有膿內托千金散初起黃連學士湯此症小兒飲甘甜熱物或母喜飲或胎中受熱而生舌上如珠先赤紫後白黃疼痛難當大者吹本針刺出血次吹祕少加冰片小者吹祕服三黃涼膈散或化毒丹如不能飲者令母飲之搽祕於乳頭上令小兒吞之舌珠亦同舌上生起珍珠毒皆由火毒犯心經紅黃赤白多疼痛小刀去血祕藥靈三黃涼膈除心火化毒丹丸孩子吞此症因心膈蘊積熱毒而生於舌老者難醫少者尤可若有孔則全症也或有一二孔其中流血或在左右有黑心大者用藥爛去黑心小者用針挑去用水藥洗淨吹本服三黃涼膈二三劑如不收口用生肌散拌勻用螓舌因心勞鬱氣舌生四眼是全形或生一二流鮮血年老難除少者生三黃涼膈初宜進黑心挑去祕吹頻收功全在生肌散舌硬瘡生命不存此症因心膈蘊積熱毒感風熱氣鬱勞苦而生或上或左右疼痛臭爛舌上生苔並腮兩邊紅腫治者吹本均割去次吹本祕數次服三黃丸化之雀舌小者以刀剔破不必割如不收口用生肌散雀舌感風由鬱氣生於舌畔苦多痰吹本用刀須割去還吹祕藥內加均三黃涼膈宜多服收口生肌如入神此症因風熱感於心經或煎炒熱物而生舌下或左右或正中形如圓眼或如棗核腫疼不堪言語不能舌卷紫硬初起吹本去血吹祕均服黃連瀉心加金銀花貝母花粉日久去膿吹祕服千金內托散後用生肌散收口捲舌癰生於舌下或左或右或居中形如果核多疼痛舌黃卷紫閉喉嚨患處用刀宜點破均祕吹之有大功黃連瀉心加貝母日久千金內托通此症心經積熱生瘡於舌狀似楊梅作事心煩服竇氏甘桔湯梔子後服黃連解毒湯吹祕不用刀針或有痰結於舌上成核強硬者吹冰硼散刀刺出血服加味二陳舌上生瘡名腫齶多由火毒內干心作事煩躁多痛苦祕吹不可用刀針甘桔黃連先後服舌上痰凝用二陳此症因心火熾盛而起形如簪孔出血不止治者摻槐花末於孔處服犀角丹皮生地赤芍黃連當歸黃芩山梔蒲黃炒黑共煎服又方赤豆一升杵碎水三碗和搗取汁每服一盞不拘時刻舌衄皆由心火盛形如簪孔血流鮮急須上摻槐花末四物丹犀與黃連赤豆一升生杵碎水和煎汁服通仙此症思慮太甚多醒少睡虛火動而起口破舌若無皮色淡而白斑細點甚者陷路龜紋脈虛不渴治者用四物湯加黃柏知母丹皮肉桂為引導從治法也外以柳花散搽之不可誤作實火用寒涼之劑並書實症於後以備參考實火因膏粱厚味醇酒炙爆心火旺而發其色紅紫滿口爛斑甚者腮舌俱腫脈實口乾宜服涼膈吹祕如舌上生瘡舌乾黃破作渴加八味丸滋化源俱禁水漱舌上龜紋虛火動狀若無皮色淡紅四物桂丹加知柏柳花散藥漫收功忌用寒涼多克伐實火休言在此中此症乃痰飲乘火流行凝注舌下結成痰腫綿軟不硬有妨飲食作痛不安治者吹本用刀將泡刺破捺干其中之痰吹冰硼散服二陳湯如愈後復發服清熱如聖散痰飲火升流舌下壅腫如綿痛不安吹本用刀須刺破流去痰膠捺令乾還要吹上冰硼散二陳加減即安然此症因火上衝痰隨火上注舌忽脹滿口中軟如豬尿泡形不疼痛口中流涎妨言語治者看舌下有青泡如蟹眼吹本祕挑破捺淨其痰以溫湯漱淨吹祕加冰硼元明粉服加味二陳湯加牛蒡連翹木通花粉一人舌忽腫脹出口痛如針刺遇一遊僧云是蜈蚣毒沿碗上人食染毒用雄雞血一盞浸舌搽玉樞丹亦可服如無雄黃硃砂冰片研極細末吹患處亦妙泡舌像如豬脬形痰隨火上犯心經不疼不痛妨言語滿口流涎食不成舌下青筋宜刺破流出痰如雞蛋清祕合冰硼吹患處服藥增加用二陳此症因心經火毒上衝而生舌下其形如珠初見一二少頃蔓生盛三五七八九如貫珠舌脹痰升不能飲食治者探去風痰吹本藥於患上逐粒去血兼刺玉液金津吹祕服黃連瀉心湯連珠風起似連珠心火沖生舌下瘀蔓生三五七八九舌脹痰生探吐愈吹本用刀須刺破玉液金津血亦祛黃連瀉心湯內服如斯治法外無餘此症受濕熱七情所傷鬱氣而起靠舌根橫起紫紅色筋治者吹本於筋上用一大針將桐油蘸燒紅照圖式上依橫筋針七處次將三小針扎品字樣每大針孔各針二次共成四十九針如舌根腫灸外邊喉下橫三穴口內煙出乃止如不出煙七壯為止服涼膈散或甘桔湯數劑吹祕自愈氣單鬱結原由起舌根橫紫起青筋吹本大針針七次每針品字各三針外邊喉下橫三灸涼膈三黃並二陳以上共針四十九調理須知要養神此症受風熱或食煎炒厚味或重衣疊被或思慮過度心火上衝蒂疔卒然紫腫吞吐不利治者不可用刀針只吹祕或用烏龍尾和炒鹽用箸頭點上用枕臥一時甚者服三黃湯加木通桔梗去川芎懸疔之症由火生重衣厚味起心經倏忽蒂中垂下腫祕吹切忌用刀針鹽水同炒烏龍尾研吹仰臥片時停甚者宜服三黃湯通桔黏子荊防功此症因心火太盛而起舌硬如山憎寒壯熱言語謇澀內服黃連瀉心湯外吹祕以刀刺紫腫處去血再針金津玉液出血自愈又或舌上紫腫用飛朴加冰片少許搽之出涎自愈或吹冰硼散木舌皆由心火盛舌如木硬紫多疼壯熱憎寒言謇澀吹祕舌下刺青筋黃連瀉心湯內服間吹本祕合冰硼刀刺紫腫去血後再針玉液與金津此症因脾經積熱上齶屬脾脾氣通於喉故上齶生瘡似粟如珠或黃或白口中腥臭手足怕冷身體畏寒治者用水藥或苦茶拭淨吹祕服清脾降火湯戒酒色七星瘡生喉上齶皆由熱毒積脾經似粟如珠黃白色滿口涎流極臭腥手足畏寒身發熱苦茶拭淨吹祕頻降火清脾噙水藥如斯指日可回生此症因勞碌乃食火酒炙爆椒薑之物而起小兒食肥甘或胎受毒或母病食熱乳而生或紅紫或黃白疼痛流涎難以飲食甚者發熱惡寒口乾便閉治者用米泔或苦茶青布蘸拭淨出血不妨吹祕服黏子解毒湯加梔子或三黃湯如小兒不能服之只以犀角化毒丹服小兒服之如臭用祕加人中黃黃連冰片麝香研極細末吹之口瘡積熱在心經滿口生瘡黃白形米泔拭淨時吹祕甚宜去血火方平黏子解毒三黃湯服之退火與涼心小兒化毒湯宜服桑葉汁塗瘡自輕此症上焦蘊積熱毒風痰塞壅而起上齶腫垂形如蛙腹或如雞子咽喉閉塞痰涎滿口治者用元明粉醋探去風痰吹本藥於腫處刀刺去血吹祕服三黃涼膈散有表症者服荊防敗毒散日久千金內托散懸蜞風毒生上齶形如蛙腹閉喉嚨探痰須用元明醋本吹刺血祕相攻內服三黃涼膈散表症荊防大有功有膿千金內托散頓教患者喜重重此症受濕熱出汗過多而起治者吹追風散刀刺去血吹祕加均本如不腫疼其內定破吹祕次以均多加冰片兒茶硼砂青黛末吹之不用本藥有痰以元明粉醋探去有膿千金內托不收口生肌散汗出生癰餘毒因追風吹上用刀針祕均加末時吹上內服三黃桔梗湯探痰須用元明醋膿成須速用千金出膿瘡口多疼痛生肌吹上即時平此症受風熱酒毒濕痰而起牙齦里兩邊生癰致舌短大兩邊未破吹本針破去血吹祕已破吹本祕或擦追風散於舌上兩邊臭爛祕合生肌加冰麝吹之水藥噙口起初服學士湯或黏子解毒湯已成服千金內托散有痰亦須探去咂舌癰生舌兩邊口中腥臭吐稠涎未破癰頭宜刺破祕本生肌合共吹學士神方黏子解已成內托散神仙此症因脾胃蓄痰風火擾動而起其唇或如口袋收撮不能飲食喉內風痰壅塞或經一年發治者用馬齒莧汁洗唇玄明粉醋探風痰針少商穴出血吹本於喉內及唇上服防風通聖散如毒入心包脘中脹滿上氣喘促下部洞泄不止者死撮口喉風胃有痰唇如口袋似繩攀喉內有痰元明粉口噤三黃刺少商馬齒莧汁洗唇軟本藥先吹祕再嘗內服通聖防風散立起沉疴免受殃此症因脾經積熱感風熱而起上齶形如紫李垂下抵舌口不能言舌不能伸頭不能低仰面而立鼻出紅涕若不速治其毒陷入於腦即死速用刀刺癰頭去血用鹽湯漱淨吹祕服荊防散雄黃化毒丸而愈懸癰生於上齶中形如紫李垂喉嚨不能言語舌難動頭不能低涕出紅刺破癰頭出毒血鹽漱湯淨祕收功雄黃解毒荊防散看症機關要變通
