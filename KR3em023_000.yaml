body:
  text: 序醫之為道切於民生日用理近而事難故古人有司命之目自仲景著一百十三方後賢纘而衍之湯液之方遂加於針石逮子和河間東垣丹溪輩根柢聖經發揮心得學者益泛濫沉酣準方施治而針石之法乃日微吳中金君保三業軒岐家言能貫穿於靈樞素問秦越人八十一難經以意為變化心殷濟時為士大夫所推服近得喉科枕祕一書針石與湯藥並施審症繪圖曲折詳盡特以無副本傳世為此商之孫君云齋云齋遂引為己任鳩資以付剞劂將緣起辨其首豫謂喉以納氣通於天和咽以納食通於地道會厭管乎其上以司開闔實為心肺肝腎呼吸出入之路聲音吐納之道關係生死為任綦重先民有言咽腫屬痰喉風屬火治法宜祛風豁痰解熱開鬱乃無遺誤若猝投辛散煽動風火必至增腫腐灼陰陽絡失所養遂不可救藥今觀是書參合證因條列治要錯綜疑似縷晰絲分令人一望而得療治之法有補於民生日用為何如耶針石之有裨於湯液為何如耶固宜不脛而走群奉為枕中鴻寶者矣雖然陰陽相貫如環無端營行脈中衛行脈外倘脈理之偶淆即洞垣其誰屬權衡乎病之淺深治之標本選用成方能奏奇效刀圭所授立起沉疴是在善讀書者同治七年龍在戊辰孟春月永康應寶時撰
